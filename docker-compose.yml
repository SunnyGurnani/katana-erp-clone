version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge_secret
      POSTGRES_DB: forgeerp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forgeerp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://forge:forge_secret@postgres:5432/forgeerp
      JWT_SECRET: super_secret_jwt_key_change_in_prod
      JWT_REFRESH_SECRET: super_secret_refresh_key_change_in_prod
      NODE_ENV: production
      PORT: "8000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        node -e \"require('tsx/cjs'); require('./apps/api/src/index.ts')\" &
        sleep 5 &&
        node -e \"require('tsx/cjs'); require('./apps/api/src/seed.ts')\" &&
        wait
      "

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
