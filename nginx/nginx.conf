worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=uploads:10m rate=5r/s;

    # File upload size (for CSV imports, product images)
    client_max_body_size 50M;

    upstream api_backend {
        server api:4000;
    }

    upstream web_frontend {
        server web:3000;
    }

    upstream minio_console {
        server minio:9001;
    }

    upstream minio_api {
        server minio:9000;
    }

    # HTTP -> HTTPS redirect (uncomment when SSL is set up)
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     location /.well-known/acme-challenge/ {
    #         root /var/www/certbot;
    #     }
    #     location / {
    #         return 301 https://$host$request_uri;
    #     }
    # }

    server {
        listen 80;
        # listen 443 ssl;  # Uncomment when SSL is ready
        # ssl_certificate /etc/nginx/certs/live/your-domain.com/fullchain.pem;
        # ssl_certificate_key /etc/nginx/certs/live/your-domain.com/privkey.pem;

        # API routes
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check (no auth)
        location /health {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        # Swagger docs
        location /docs {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        # File uploads
        location /api/v1/upload {
            limit_req zone=uploads burst=10 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            client_max_body_size 50M;
        }

        # MinIO file serving (public read for product images etc)
        location /files/ {
            proxy_pass http://minio_api/forgeerp/;
            proxy_set_header Host $host;
        }

        # MinIO console (admin only, consider restricting by IP)
        location /minio-console/ {
            proxy_pass http://minio_console/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Frontend (catch-all)
        location / {
            proxy_pass http://web_frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
